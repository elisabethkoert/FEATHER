name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout FEATHER
        uses: actions/checkout@v4

      - name: Clone fChrimsonICManuscript
        env:
          PAT: ${{ secrets.FCHRIMSON_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/elisabethkoert/fChrimsonICManuscript.git \
            /home/runner/work/fChrimsonICManuscript
          echo "fChrimsonICManuscript cloned to /home/runner/work/fChrimsonICManuscript"
